<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-label="BuilderFox den mark">
  <title>BuilderFox</title>
  <!--
    BuilderFox - "The Den"
    A warm-green pebble (the den a fox builds); the fox exists only as carved
    negative space. Upper right: ear, brow stop, dished muzzle and a leaf-shaped
    eye set on the muzzle line. Lower arc: the tail, swept from a calligraphic
    tapered root to a teardrop tip dipped in crimson - the red circle sits
    beneath the green and shows only through the tail-tip cutout, so the mark
    holds on light or dark ground.
    Geometry: pebble is a true circle (c 120,124 r 88, kappa handles 48.6);
    tail edges are concentric-offset arcs (outer r 75 on the pebble centre,
    inner r 66 on 125,117) for continuous taper.
    Brand tokens: fox-green #79A84B | crimson #C9304C | ink #23271E (unused)
  -->
  <circle cx="180" cy="158.5" r="14" fill="#C9304C"/>
  <path fill="#79A84B" fill-rule="evenodd" d="
    M 120,36
    C 168.6,36 208,75.4 208,124
